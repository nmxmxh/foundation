name: foundation-service-backed

services:
  service-postgres:
    image: ${SERVICE_BACKED_POSTGRES_IMAGE:-postgres:18-alpine}
    environment:
      POSTGRES_USER: ${SERVICE_BACKED_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${SERVICE_BACKED_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${SERVICE_BACKED_DB_NAME:-foundation_service_test}
    ports:
      - target: 5432
        published: ${SERVICE_BACKED_POSTGRES_PORT:-0}
        protocol: tcp
    command:
      - postgres
      - -c
      - max_connections=${SERVICE_BACKED_POSTGRES_MAX_CONNECTIONS:-120}
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_timeout=${SERVICE_BACKED_POSTGRES_CHECKPOINT_TIMEOUT:-15min}
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=${SERVICE_BACKED_POSTGRES_MAX_WAL_SIZE:-1GB}
      - -c
      - min_wal_size=${SERVICE_BACKED_POSTGRES_MIN_WAL_SIZE:-256MB}
      - -c
      - wal_compression=on
      - -c
      - autovacuum=on
      - -c
      - autovacuum_max_workers=${SERVICE_BACKED_POSTGRES_AUTOVACUUM_MAX_WORKERS:-5}
      - -c
      - autovacuum_work_mem=${SERVICE_BACKED_POSTGRES_AUTOVACUUM_WORK_MEM:-128MB}
      - -c
      - autovacuum_vacuum_insert_scale_factor=${SERVICE_BACKED_POSTGRES_AUTOVACUUM_INSERT_SCALE_FACTOR:-0.05}
      - -c
      - autovacuum_naptime=${SERVICE_BACKED_POSTGRES_AUTOVACUUM_NAPTIME:-10s}
      - -c
      - log_checkpoints=on
      - -c
      - log_autovacuum_min_duration=1s
      - -c
      - random_page_cost=1.1
      - -c
      - jit=off
      - -c
      - synchronous_commit=${SERVICE_BACKED_POSTGRES_SYNCHRONOUS_COMMIT:-on}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-foundation_service_test}"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql:size=${SERVICE_BACKED_POSTGRES_TMPFS_SIZE:-768m}

  service-redis:
    image: ${SERVICE_BACKED_REDIS_IMAGE:-redis:8-alpine}
    ports:
      - target: 6379
        published: ${SERVICE_BACKED_REDIS_PORT:-0}
        protocol: tcp
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
      - --maxmemory
      - ${SERVICE_BACKED_REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lfu
      - --io-threads
      - "2"
      - --io-threads-do-reads
      - "yes"
      - --hz
      - "20"
      - --tcp-backlog
      - "1024"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
