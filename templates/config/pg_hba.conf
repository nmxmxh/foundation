# PostgreSQL client authentication for Foundation Compose deployments.
# The service port is only exposed on the Compose network in production.
# Container-local socket access is trusted for operator recovery through
# `docker exec`. TCP clients, including migrations and app containers on the
# Compose network, must authenticate with SCRAM.

local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
