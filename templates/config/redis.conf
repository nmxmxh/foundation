# Redis Configuration for Ovasabi Foundation Projects
# Password is set via command line in docker-compose

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Networking
bind 0.0.0.0
protected-mode yes
tcp-keepalive 300

# Logging
loglevel notice

# Performance
tcp-backlog 511
timeout 0
