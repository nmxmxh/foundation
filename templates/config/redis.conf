# Redis Configuration for Ovasabi Foundation Projects
# Password is set via command line in docker-compose

# Persistence
# Foundation treats Redis as an ephemeral cache, lock, pub/sub, and fanout
# substrate. Durable workflow state belongs in Postgres/River. Enable RDB/AOF
# per project only when Redis is explicitly part of the recovery contract.
save ""
appendonly no

# Memory management. Redis is an ephemeral cache/coordination layer here, so LFU
# eviction is preferred for adaptive cache hit ratios once maxmemory is reached.
maxmemory 256mb
maxmemory-policy allkeys-lfu
maxmemory-samples 10

# Networking
bind 0.0.0.0
protected-mode yes
tcp-keepalive 300
tcp-backlog 1024

# Logging
loglevel notice

# Performance
timeout 0
io-threads 2
io-threads-do-reads yes
hz 20
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes

# Keyspace notifications stay off by default; turn on per app only when needed.
notify-keyspace-events ""
