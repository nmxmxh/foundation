# PostgreSQL Configuration for Ovasabi Foundation Projects
# Baseline targets PostgreSQL 18+. Adjust memory and I/O values for production hardware.

# Security
password_encryption = scram-sha-256
ssl = off  # Enable in production with proper certificates

# Connection settings
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# Memory settings (adjust based on available RAM)
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL settings
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
checkpoint_warning = 30s
# SSD/write-amplification notes:
# - Keep full_page_writes enabled unless storage/recovery posture is formally reviewed.
# - Consider wal_compression for write-heavy production workloads with high full-page-image volume.
# - Size max_wal_size/checkpoints from pg_stat_wal, checkpoint logs, recovery target, and SSD write budget.

# PostgreSQL 18 async I/O baseline. Worker mode is portable; io_uring can be
# tested on Linux hosts built with liburing support.
io_method = worker
io_workers = 3
io_max_concurrency = 64
io_max_combine_limit = 256kB
io_combine_limit = 256kB

# Vacuum/analyze should keep bloat visible and bounded for event-heavy apps.
autovacuum = on
autovacuum_max_workers = 5
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_insert_scale_factor = 0.05
autovacuum_naptime = 10s
track_cost_delay_timing = on
log_autovacuum_min_duration = 1s

# Query planning
random_page_cost = 1.1
effective_io_concurrency = 200
maintenance_io_concurrency = 200
default_statistics_target = 100

# Guardrails: Foundation app pools override these with lane-specific session
# budgets via database.ApplyPoolOptions. Keep config-level values as a broad
# fallback for unmanaged sessions, migrations, and administrative clients.
statement_timeout = 30s
idle_in_transaction_session_timeout = 30s
# Do not set lock_timeout globally; app pools set it per session so hot lanes
# fail lock pressure quickly without surprising admin or migration sessions.

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_checkpoints = on
log_lock_waits = on
deadlock_timeout = 1s
log_connections = off
log_disconnections = off
log_duration = off
log_statement = 'none'
log_temp_files = 0
log_timezone = 'UTC'
track_io_timing = on
track_wal_io_timing = on
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_planning = on

# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
