include /etc/nginx/modules/*.conf;

worker_processes auto;
worker_rlimit_nofile 8192;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main_json '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_method":"$request_method","request_uri":"$request_uri","status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_response_time":"$upstream_response_time"}';
    access_log /dev/stdout main_json;
    error_log /dev/stderr warn;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/wasm application/octet-stream application/rss+xml application/atom+xml image/svg+xml;

    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript application/wasm application/octet-stream application/rss+xml application/atom+xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Rate-limit rejections must be distinguishable from a dead upstream:
    # 429 tells clients to back off; the default 503 reads as "server down"
    # and invites immediate retries that keep the limiter tripped.
    limit_req_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $scheme;
        ~.+ $http_x_forwarded_proto;
    }

    include /etc/nginx/conf.d/*.conf;
}
