version: '3.8'

# Test Infrastructure
# This compose file provides isolated test infrastructure.
# Usage: docker compose -f docker-compose.test.yml up -d
#
# Environment variables:
#   TEST_DB_NAME: Name of test database (default: {{PROJECT_NAME}}_test)
#   TEST_DB_PORT: Port to expose PostgreSQL (default: 5433)
#   TEST_REDIS_PORT: Port to expose Redis (default: 6380)

services:
  test-postgres:
    image: postgres:16-alpine
    container_name: {{PROJECT_NAME}}-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${TEST_DB_NAME:-{{PROJECT_NAME}}_test}
    ports:
      - "${TEST_DB_PORT:-5433}:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  test-redis:
    image: redis:7-alpine
    container_name: {{PROJECT_NAME}}-test-redis
    ports:
      - "${TEST_REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Migration runner for test database
  test-migrate:
    image: migrate/migrate:v4.17.0
    container_name: {{PROJECT_NAME}}-test-migrate
    depends_on:
      test-postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: >
      -path=/migrations
      -database=postgresql://postgres:postgres@test-postgres:5432/${TEST_DB_NAME:-{{PROJECT_NAME}}_test}?sslmode=disable
      up
    networks:
      - test-network

volumes:
  test_postgres_data:

networks:
  test-network:
    driver: bridge
