# =============================================================================
# Docker Compose - Production Configuration
# =============================================================================
# This file is auto-generated by foundation init.sh
# Project-specific values are substituted during project creation.
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
      args:
        POSTGRES_VERSION: "${POSTGRES_VERSION:-18}"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-postgres
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    expose:
      - "5432"
    volumes:
      # PostgreSQL 18+ stores data in major-version-specific subdirectories.
      # Mount the parent directory so pg_upgrade can work across versions.
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: "${DB_NAME:-{{PROJECT_NAME}}}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-{{PROJECT_NAME}}}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # Redis Cache
  app-redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
      args:
        REDIS_VERSION: "${REDIS_VERSION:-8-alpine}"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD:-redis}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
      args:
        GO_VERSION: "${GO_VERSION:-1.26}"
        ALPINE_VERSION: "${ALPINE_VERSION:-3.23}"
        CACHE_NAMESPACE: "${DOCKER_CACHE_NAMESPACE:-ovasabi-foundation-v1}"
        PROJECT_NAME: "${PROJECT_NAME:-server}"
        VERSION: "${VERSION:-dev}"
        BUILDKIT_INLINE_CACHE: "1"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-server
    depends_on:
      app-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure:3
    volumes:
      - uploads_data:/srv/uploads
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "${DATABASE_URL:-}"
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_NAME: "${DB_NAME:-{{PROJECT_NAME}}}"
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      DB_MAX_CONNS: "${DB_MAX_CONNS:-0}"
      DB_MIN_CONNS: "${DB_MIN_CONNS:-0}"
      DB_ACQUIRE_TIMEOUT: "${DB_ACQUIRE_TIMEOUT:-100ms}"
      DB_QUERY_TIMEOUT: "${DB_QUERY_TIMEOUT:-250ms}"
      DB_HOT_READ_TIMEOUT: "${DB_HOT_READ_TIMEOUT:-50ms}"
      DB_SHARD_COUNT: "${DB_SHARD_COUNT:-1}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis}@app-redis:6379"
      REDIS_SHARD_URLS: "${REDIS_SHARD_URLS:-}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-32}"
      REDIS_MIN_IDLE: "${REDIS_MIN_IDLE:-4}"
      REDIS_MAX_RETRIES: "${REDIS_MAX_RETRIES:-1}"
      REDIS_DIAL_TIMEOUT: "${REDIS_DIAL_TIMEOUT:-2s}"
      REDIS_READ_TIMEOUT: "${REDIS_READ_TIMEOUT:-500ms}"
      REDIS_WRITE_TIMEOUT: "${REDIS_WRITE_TIMEOUT:-500ms}"
      REDIS_PREFIX: "${REDIS_PREFIX:-{{PROJECT_NAME}}}"
      JWT_SECRET: "${JWT_SECRET:-Nx7Qk2vZpR8mYcJ4hLwT9sBdF3aVuGeHqMoI1jXnKrPyZ0AbCdEfSgUvWiOhLtMn}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-Nx7Qk2vZpR8mYcJ4hLwT9sBdF3aVuGeHqMoI1jXnKrPyZ0AbCdEfSgUvWiOhLtMn}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Tracing (optional)
      TRACING_ENABLED: "${TRACING_ENABLED:-false}"
      TRACING_ENDPOINT: "${TRACING_ENDPOINT:-}"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Database Migrations
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
      args:
        MIGRATE_VERSION: "${MIGRATE_VERSION:-v4.17.0}"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-migrate
    entrypoint: ["/bin/sh", "-c"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_RESET=${DB_RESET:-false}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-{{PROJECT_NAME}}}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - MIGRATE_MAX_RETRIES=${MIGRATE_MAX_RETRIES:-120}
      - MIGRATE_AUTH_GRACE_SECONDS=${MIGRATE_AUTH_GRACE_SECONDS:-30}
      - MIGRATE_PATH=/migrations
      - MIGRATE_DATABASE_OPTIONS=${MIGRATE_DATABASE_OPTIONS:-}
    command:
      - |
        db_url="$${DATABASE_URL:-}"
        if printf '%s' "$$db_url" | grep -Eqi '@(localhost|127\.0\.0\.1|\[::1\]|::1)(:|/)'; then
          echo "DATABASE_URL points at localhost, which is the migrate container itself."
          echo "Unset DATABASE_URL and use DB_HOST=postgres, or set DATABASE_URL to the reachable Postgres service hostname."
          exit 1
        fi
        if [ -z "$${db_url}" ]; then
          if [ -z "$${DB_HOST}" ]; then
            echo "Either DATABASE_URL or DB_HOST is required for migrations."
            echo "Production deployments should provide DATABASE_URL or DB_HOST."
            exit 1
          fi
          db_query="sslmode=$${DB_SSLMODE:-disable}"
          db_url="postgres://$${DB_USER:-postgres}:$${DB_PASSWORD}@$${DB_HOST}:$${DB_PORT:-5432}/$${DB_NAME}?$${db_query}$${MIGRATE_DATABASE_OPTIONS}"
        fi
        if [ "$${DB_RESET}" = "true" ]; then
          echo "WARNING: Resetting database..."
          migrate -path="$${MIGRATE_PATH:-/migrations}" -database="$$db_url" drop -f
        fi
        attempt=1
        max_attempts=$${MIGRATE_MAX_RETRIES:-120}
        auth_grace=$${MIGRATE_AUTH_GRACE_SECONDS:-30}
        start_ts=$$(date +%s)
        while [ $$attempt -le $$max_attempts ]; do
          output=$$(migrate -path="$${MIGRATE_PATH:-/migrations}" -database="$$db_url" up 2>&1)
          status=$$?
          echo "$$output"
          if [ $$status -eq 0 ] || printf '%s' "$$output" | grep -qi 'no change'; then
            echo "Migrations completed successfully"
            exit 0
          fi
          if printf '%s' "$$output" | grep -qi 'Dirty database version'; then
            echo "Database is dirty - manual intervention required"
            exit $$status
          fi
          if printf '%s' "$$output" | grep -Eqi 'password authentication failed|failed SASL auth|no pg_hba\.conf entry'; then
            # pg_isready flips healthy the moment Postgres accepts connections, but the
            # POSTGRES_USER/POSTGRES_PASSWORD role from initdb may not exist yet on a
            # cold volume. Retry auth failures during the grace window; only escalate
            # to a hard failure once the window has elapsed and it looks like a real
            # credential misconfiguration.
            elapsed=$$(( $$(date +%s) - start_ts ))
            if [ $$elapsed -ge $$auth_grace ]; then
              echo "Migration failed: database authentication still failing after $${auth_grace}s grace."
              echo "Check DB_USER, DB_PASSWORD, DB_NAME, DATABASE_URL, and the existing Postgres volume credentials."
              exit $$status
            fi
            echo "Auth not ready yet ($${elapsed}s/$${auth_grace}s grace) - retrying..."
          fi
          if printf '%s' "$$output" | grep -Eqi 'no such host|name or service not known|temporary failure in name resolution'; then
            echo "Migration failed: database host '$${DB_HOST}' is not resolvable from this Compose network."
            echo "Use the development compose override locally, or set DB_HOST/DATABASE_URL to the reachable Postgres hostname."
            exit $$status
          fi
          if [ $$attempt -eq $$max_attempts ]; then
            echo "Migration failed after $$max_attempts attempts"
            exit $$status
          fi
          echo "Retrying migrations... ($$attempt/$$max_attempts)"
          attempt=$$((attempt+1))
          sleep 1
        done
    restart: "no"
  
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        CACHE_NAMESPACE: "${DOCKER_CACHE_NAMESPACE:-ovasabi-foundation-v1}"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-frontend
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    environment:
      UPSTREAM_HOST: server
      UPSTREAM_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app-network:
    external: true
    name: ${NETWORK_NAME:-coolify}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
