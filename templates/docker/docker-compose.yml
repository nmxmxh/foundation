# =============================================================================
# Docker Compose - Production Configuration
# =============================================================================
# This file is auto-generated by foundation init.sh
# Project-specific values are substituted during project creation.
# =============================================================================

services:
  # Redis Cache
  app-redis:
    image: redis:7-alpine
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
      args:
        GO_VERSION: "${GO_VERSION:-1.25}"
        ALPINE_VERSION: "${ALPINE_VERSION:-3.23}"
        CACHE_NAMESPACE: "${DOCKER_CACHE_NAMESPACE:-ovasabi-foundation-v1}"
        PROJECT_NAME: "${PROJECT_NAME:-server}"
        VERSION: "${VERSION:-dev}"
        BUILDKIT_INLINE_CACHE: "1"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-server
    depends_on:
      app-redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure:3
    volumes:
      - uploads_data:/srv/uploads
      # SSL CA certificate (for managed databases)
      - ${SSL_CA_CERT_PATH:-./config/certs/ca.crt}:/etc/ssl/certs/ca.crt:ro
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "${DATABASE_URL:-}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@app-redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Tracing (optional)
      TRACING_ENABLED: "${TRACING_ENABLED:-false}"
      TRACING_ENDPOINT: "${TRACING_ENDPOINT:-}"
    networks:
      - app-network
    labels:
      # Traefik routing (customize paths as needed)
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME:-{{PROJECT_NAME}}}-api.rule=PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/healthz`)"
      - "traefik.http.routers.${SERVICE_NAME:-{{PROJECT_NAME}}}-api.priority=10"
      - "traefik.http.services.${SERVICE_NAME:-{{PROJECT_NAME}}}-api.loadbalancer.server.port=8080"
      - "traefik.http.services.${SERVICE_NAME:-{{PROJECT_NAME}}}-api.loadbalancer.server.scheme=http"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Database Migrations
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
      args:
        MIGRATE_VERSION: "${MIGRATE_VERSION:-v4.17.0}"
    container_name: ${SERVICE_NAME:-{{PROJECT_NAME}}}-migrate
    entrypoint: ["/bin/sh", "-c"]
    networks:
      - app-network
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_RESET=${DB_RESET:-false}
      - MIGRATE_MAX_RETRIES=${MIGRATE_MAX_RETRIES:-60}
      - MIGRATE_PATH=/migrations
    volumes:
      - ${SSL_CA_CERT_PATH:-./config/certs/ca.crt}:/etc/ssl/certs/ca.crt:ro
    command:
      - |
        db_url="$${DATABASE_URL:-}"
        if [ -z "$${db_url}" ]; then
          if [ -z "$${DB_HOST}" ]; then
            echo "Either DATABASE_URL or DB_HOST is required for migrations."
            exit 1
          fi
          db_query="sslmode=$${DB_SSLMODE:-disable}"
          db_url="postgres://$${DB_USER:-postgres}:$${DB_PASSWORD}@$${DB_HOST}:$${DB_PORT:-5432}/$${DB_NAME}?$${db_query}"
        fi
        if [ "$${DB_RESET}" = "true" ]; then
          echo "WARNING: Resetting database..."
          migrate -path="$${MIGRATE_PATH:-/migrations}" -database="$$db_url" drop -f
        fi
        attempt=1
        max_attempts=$${MIGRATE_MAX_RETRIES:-60}
        while [ $$attempt -le $$max_attempts ]; do
          output=$$(migrate -path="$${MIGRATE_PATH:-/migrations}" -database="$$db_url" up 2>&1)
          status=$$?
          echo "$$output"
          if [ $$status -eq 0 ] || printf '%s' "$$output" | grep -qi 'no change'; then
            echo "Migrations completed successfully"
            exit 0
          fi
          if printf '%s' "$$output" | grep -qi 'Dirty database version'; then
            echo "Database is dirty - manual intervention required"
            exit $$status
          fi
          if [ $$attempt -eq $$max_attempts ]; then
            echo "Migration failed after $$max_attempts attempts"
            exit $$status
          fi
          echo "Retrying migrations... ($$attempt/$$max_attempts)"
          attempt=$$((attempt+1))
          sleep 1
        done
    restart: "no"

networks:
  app-network:
    external: true
    name: ${NETWORK_NAME:-coolify}

volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local
