// Shared request and response metadata for Foundation app contracts.
syntax = "proto3";

package common.v1;

option go_package = "github.com/ovasabi/{{PROJECT_NAME}}/api/protos/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

message RequestMetadata {
  string correlation_id = 1;
  string idempotency_key = 2;
  string device_id = 3;
  string user_id = 4;
  string organization_id = 5;
  google.protobuf.Timestamp timestamp = 6;
  repeated string tags = 7;
  repeated string categories = 8;
  string source_ref = 9;
  string channel = 10;
  string locale = 11;
  string tenant_region = 12;
  string knowledge_graph = 13;
  map<string, string> attributes = 14;
}

message ResponseMetadata {
  string correlation_id = 1;
  string request_id = 2;
  int64 processing_time_ms = 3;
  repeated string tags = 4;
  repeated string categories = 5;
  string knowledge_graph = 6;
  map<string, string> attributes = 7;
}
