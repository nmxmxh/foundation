version: "2"

linters:
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - exhaustive
    - gocognit
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 20
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: context-as-argument
        - name: early-return
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
          disabled: true
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: var-naming
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    rules:
      - path: '(^|/)(api/protos|migrations)/'
        linters:
          - gocognit
          - gocyclo
          - gosec
          - govet
          - revive
          - unparam
          - unused
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
