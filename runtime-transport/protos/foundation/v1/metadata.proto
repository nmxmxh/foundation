syntax = "proto3";

package foundation.v1;

option go_package = "github.com/nmxmxh/ovasabi_foundation/runtime-transport/go/generated/foundation/v1;foundationpb";

import "google/protobuf/timestamp.proto";

message ValidityPeriod {
  string effective_from = 1;
  string effective_to = 2;
}

message GlobalContext {
  string user_id = 1;
  string session_id = 2;
  string source = 3;
  string device_id = 4;
  string organization_id = 5;
  string role_id = 6;
  string audit_context = 7;
  string ip_address = 8;
  string user_agent = 9;
  string actor_type = 10;
  string regulated_entity_ref = 11;
  string jurisdiction = 12;
}

message Metadata {
  GlobalContext global_context = 1;
  repeated string tags = 2;
  double ai_confidence = 3;
  string embedding_id = 4;
  repeated string categories = 5;
  string knowledge_graph = 6;
  string source_ref = 7;
  ValidityPeriod validity_period = 8;
  string gamification_state = 9;
  string correlation_id = 10;
  string causation_id = 11;
  string request_id = 12;
  string idempotency_key = 13;
  string trace_id = 14;
  string span_id = 15;
  string channel = 16;
  string locale = 17;
  string tenant_region = 18;
  map<string, string> attributes = 19;
  bytes extras_json = 20;
  google.protobuf.Timestamp requested_at = 21;
  google.protobuf.Timestamp processed_at = 22;
  string policy_snapshot_ref = 23;
  string legal_basis_code = 24;
  string reason_code = 25;
  string data_classification = 26;
  string retention_class = 27;
  repeated string jurisdiction_tags = 28;
  string route_key = 29;
  string source_service = 30;
  string source_queue = 31;
  string source_channel = 32;
  string payload_hash = 33;
  string signature_ref = 34;
}
